<section class="catalog container">
  <header class="catalog__header">
    <h1 class="catalog__title">Product catalog</h1>
    <p class="catalog__subtitle">Browse the catalog and add new products.</p>
  </header>

  <div class="catalog__layout">
    <aside class="catalog__sidebar">
      <nav class="catalog__tabs" role="tablist" aria-label="Sidebar sections">
        <button
          type="button"
          role="tab"
          class="catalog__tab"
          [class.catalog__tab--active]="activeTab() === 'add'"
          [attr.aria-selected]="activeTab() === 'add'"
          (click)="selectTab('add')"
        >
          Add product
        </button>
        <button
          type="button"
          role="tab"
          class="catalog__tab"
          [class.catalog__tab--active]="activeTab() === 'search'"
          [attr.aria-selected]="activeTab() === 'search'"
          (click)="selectTab('search')"
        >
          Search products
        </button>
      </nav>

      <div class="catalog__panel">
        @if (activeTab() === 'add') {
          <app-product-form (productAdded)="onProductAdded()" />
        } @else {
          <app-product-filter-bar
            [code]="code()"
            [name]="name()"
            (filterChange)="onFilterChange($event)"
          />
        }
      </div>
    </aside>

    <div class="catalog__content">
      @if (loading()) {
        <app-spinner label="Loading products..." />
      } @else if (error()) {
        <app-error-banner [message]="error()!" (retry)="reload()" />
      } @else {
        <app-product-list
          [products]="products()"
          [emptyTitle]="emptyTitle()"
          [emptyDescription]="emptyDescription()"
        />

        <app-product-paginator
          [page]="page()"
          [pageSize]="pageSize()"
          [total]="total()"
          (pageChange)="onPageChange($event)"
        />
      }
    </div>
  </div>
</section>
