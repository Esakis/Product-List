@if (hasResults()) {
  <nav class="paginator" aria-label="Pagination">
    <button
      type="button"
      class="paginator__button"
      [disabled]="!canGoPrevious()"
      (click)="goPrevious()"
    >
      Previous
    </button>

    <span class="paginator__status" aria-live="polite">
      Page {{ page() }} of {{ totalPages() }}
    </span>

    <button
      type="button"
      class="paginator__button"
      [disabled]="!canGoNext()"
      (click)="goNext()"
    >
      Next
    </button>
  </nav>
}
